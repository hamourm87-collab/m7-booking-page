<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>M7 Digital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000812;overflow-x:hidden;font-family:'Courier New',monospace;color:#fff}
#scroll-space{height:750vh}
#canvas-wrapper{position:fixed;inset:0;z-index:0}
canvas{display:block;width:100%!important;height:100%!important}
#vignette{position:fixed;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 35%,rgba(0,4,14,0.7) 75%,rgba(0,2,10,0.97) 100%)}
nav{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;align-items:center;padding:11px 30px;
  border:1px solid rgba(255,255,255,0.12);border-radius:30px;
  background:rgba(0,6,20,0.55);backdrop-filter:blur(20px);white-space:nowrap;gap:4px}
.nl{font-size:10px;letter-spacing:3px;color:rgba(200,220,255,0.7);text-decoration:none}
.ns{color:rgba(255,255,255,0.2);margin:0 10px;font-size:11px}
#sh{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;transition:opacity .7s}
#sh div:first-child{font-size:9px;letter-spacing:5px;color:rgba(200,220,255,0.35)}
#sh-line{width:1px;height:28px;margin:8px auto 0;
  background:linear-gradient(to bottom,rgba(200,220,255,0.4),transparent);
  animation:shp 1.8s ease-in-out infinite}
@keyframes shp{0%,100%{transform:scaleY(0);transform-origin:top}60%{transform:scaleY(1);transform-origin:top}}
.ov{position:fixed;z-index:10;opacity:0;pointer-events:none;transition:opacity .7s}
#hero{left:8%;top:50%;transform:translateY(-50%);max-width:380px}
#hero h1{font-size:clamp(28px,5vw,62px);letter-spacing:6px;line-height:1.05;
  background:linear-gradient(135deg,#fff 55%,rgba(100,180,255,0.8));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#hero p{font-size:9px;letter-spacing:4px;color:rgba(100,160,255,0.55);margin-top:14px}
#sidebar{left:6%;top:50%;transform:translateY(-50%);
  background:rgba(0,6,22,0.82);backdrop-filter:blur(28px);
  border:1px solid rgba(100,160,255,0.1);border-radius:12px;padding:24px 22px;min-width:220px}
#sidebar h3{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.8);margin-bottom:12px}
.sd{height:1px;background:rgba(100,160,255,0.1);margin:12px 0}
.sl{display:block;font-size:10px;letter-spacing:1px;color:#1aeade;margin:8px 0;text-decoration:none;pointer-events:all}
#labtxt{bottom:14%;left:50%;transform:translateX(-50%);text-align:center}
#labtxt h2{font-size:clamp(20px,3vw,42px);letter-spacing:7px;
  background:linear-gradient(135deg,#8a45ff,#1aeade);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#labtxt p{font-size:9px;letter-spacing:3px;color:rgba(138,69,255,0.55);margin-top:10px}
</style>
</head>
<body>
<div id="vignette"></div>
<div id="canvas-wrapper"><canvas id="c"></canvas></div>
<div id="scroll-space"></div>
<nav><a href="#" class="nl">WORK</a><span class="ns">&mdash;</span><a href="#" class="nl">CONTACT</a></nav>
<div id="sh"><div>SCROLL</div><div id="sh-line"></div></div>
<div class="ov" id="hero"><h1>M7<br>DIGITAL</h1><p>PREMIUM DIGITAL EXPERIENCES</p></div>
<div class="ov" id="sidebar">
  <h3>WHAT ARE YOU<br>LOOKING FOR?</h3>
  <div class="sd"></div>
  <a href="#" class="sl">-&gt; DIGITAL TRANSFORMATION</a>
  <a href="#" class="sl">-&gt; SOCIAL MEDIA</a>
  <a href="#" class="sl">-&gt; TRADING SYSTEMS</a>
  <a href="#" class="sl">-&gt; XR / AI</a>
  <a href="#" class="sl">-&gt; E-COMMERCE</a>
</div>
<div class="ov" id="labtxt"><h2>// THE LAB</h2><p>WHERE PROTOTYPES BECOME PRODUCTION</p></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
(function() {
'use strict';

function init() {
  if (typeof THREE === 'undefined') { setTimeout(init, 80); return; }
  if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
    gsap.registerPlugin(ScrollTrigger);
  }

  var mob = window.innerWidth < 768;
  var W = window.innerWidth, H = window.innerHeight;

  // RENDERER
  var canvas = document.getElementById('c');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: !mob, alpha: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, mob ? 1.5 : 2));
  renderer.setClearColor(0x000812);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;

  // SCENE
  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000812, 0.011);

  // CAMERA
  var camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 200);
  camera.position.set(0, 1, 10);

  // LIGHTS
  scene.add(new THREE.AmbientLight(0x050a18, 4));
  var keyL = new THREE.PointLight(0xd4af37, 4, 40);
  keyL.position.set(3, 6, 8); scene.add(keyL);
  var fillL = new THREE.PointLight(0x4477ff, 2, 30);
  fillL.position.set(-4, 0, 5); scene.add(fillL);
  var labL = new THREE.PointLight(0x8a45ff, 5, 28);
  labL.position.set(0, -65, 3); scene.add(labL);
  var movL = new THREE.PointLight(0x6688dd, 2, 14);
  scene.add(movL);

  // SHARED SHADER MATERIAL FACTORY
  function makeParticleMat(sizeFactor, pr) {
    return new THREE.ShaderMaterial({
      uniforms: { uPR: { value: pr } },
      vertexShader: [
        'attribute vec3 aColor;',
        'attribute float aSize;',
        'uniform float uPR;',
        'varying vec3 vColor;',
        'void main() {',
        '  vColor = aColor;',
        '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
        '  gl_Position = projectionMatrix * mv;',
        '  gl_PointSize = aSize * uPR * (' + sizeFactor.toFixed(1) + ' / -mv.z);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'varying vec3 vColor;',
        'void main() {',
        '  float d = length(gl_PointCoord - vec2(0.5));',
        '  if (d > 0.5) discard;',
        '  float s = 1.0 - smoothstep(0.0, 0.5, d);',
        '  float c = 1.0 - smoothstep(0.0, 0.22, d);',
        '  gl_FragColor = vec4(vColor + vColor * c * 0.5, s * 0.92);',
        '}'
      ].join('\n'),
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
  }

  function makeParticleSystem(count, positions, colors, sizes) {
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    return geo;
  }

  // ============================================================
  // LOGO
  // ============================================================
  var logoGroup = new THREE.Group();
  scene.add(logoGroup);

  // Outer ring
  var chromeMat = new THREE.MeshStandardMaterial({
    color: 0x8ab8d8, metalness: 1.0, roughness: 0.0,
    emissive: 0x112233, emissiveIntensity: 0.3
  });
  logoGroup.add(new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.042, 20, 100), chromeMat));

  // Inner ring glow
  logoGroup.add(new THREE.Mesh(
    new THREE.TorusGeometry(1.35, 0.012, 8, 80),
    new THREE.MeshBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending })
  ));

  // M7 canvas inside ring
  var logoCV = document.createElement('canvas');
  logoCV.width = 256; logoCV.height = 256;
  var logoCX = logoCV.getContext('2d');
  logoCX.clearRect(0, 0, 256, 256);
  logoCX.fillStyle = 'rgba(255,255,255,0.08)';
  logoCX.beginPath(); logoCX.arc(128, 128, 110, 0, Math.PI * 2); logoCX.fill();
  logoCX.fillStyle = '#ffffff';
  logoCX.font = 'bold 80px Courier New';
  logoCX.textAlign = 'center';
  logoCX.textBaseline = 'middle';
  logoCX.fillText('M7', 128, 128);
  var logoTex = new THREE.CanvasTexture(logoCV);
  var logoPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(2.8, 2.8),
    new THREE.MeshBasicMaterial({ map: logoTex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
  );
  logoGroup.add(logoPlane);

  // TWO WIRE ARMS (teardrop shape above the ring)
  var armMat = new THREE.MeshStandardMaterial({
    color: 0xc87d5f, metalness: 0.9, roughness: 0.1,
    emissive: 0x441100, emissiveIntensity: 0.4
  });
  function makeArm(pts) {
    var curve = new THREE.CatmullRomCurve3(pts);
    var tubeGeo = new THREE.TubeGeometry(curve, 24, 0.012, 6, false);
    return new THREE.Mesh(tubeGeo, armMat);
  }
  // Left arm &mdash; note: use negative sign as ASCII hyphen
  logoGroup.add(makeArm([
    new THREE.Vector3(-0.9, 0, 0),
    new THREE.Vector3(-1.8, 1.2, 0),
    new THREE.Vector3(-0.4, 2.6, 0),
    new THREE.Vector3(0, 3.8, 0)
  ]));
  // Right arm
  logoGroup.add(makeArm([
    new THREE.Vector3(0.9, 0, 0),
    new THREE.Vector3(1.8, 1.2, 0),
    new THREE.Vector3(0.4, 2.6, 0),
    new THREE.Vector3(0, 3.8, 0)
  ]));

  // Gold prismatic arc at bottom of ring
  var arcC = new THREE.EllipseCurve(0, 0, 0.22, 0.22, -0.2, Math.PI * 1.4, false, 0);
  var arcPts = arcC.getPoints(30).map(function(p) { return new THREE.Vector3(p.x, p.y, 0); });
  var arcGeo = new THREE.BufferGeometry().setFromPoints(arcPts);
  var arcLine = new THREE.Line(arcGeo, new THREE.LineBasicMaterial({ color: 0xffde7b }));
  arcLine.position.set(0.9, -1.75, 0);
  logoGroup.add(arcLine);

  // Logo orbital bokeh particles
  var LON = 80;
  var loP = new Float32Array(LON * 3);
  var loC = new Float32Array(LON * 3);
  var loS = new Float32Array(LON);
  for (var i = 0; i < LON; i++) {
    var a = (i / LON) * Math.PI * 2;
    var r = 1.8 + Math.random() * 1.6;
    loP[i*3] = Math.cos(a) * r; loP[i*3+1] = Math.sin(a) * r + Math.random() * 1.5 - 0.75; loP[i*3+2] = (Math.random() - 0.5) * 0.6;
    var rc = Math.random();
    if (rc < 0.6) { loC[i*3] = 0.95; loC[i*3+1] = 0.75; loC[i*3+2] = 0.2; }
    else if (rc < 0.8) { loC[i*3] = 1.0; loC[i*3+1] = 0.45; loC[i*3+2] = 0.15; }
    else { loC[i*3] = 1.0; loC[i*3+1] = 1.0; loC[i*3+2] = 1.0; }
    loS[i] = 0.6 + Math.random() * 1.2;
  }
  var loGeo = makeParticleSystem(LON, loP, loC, loS);
  var loPts = new THREE.Points(loGeo, makeParticleMat(220, renderer.getPixelRatio()));
  logoGroup.add(loPts);

  // ============================================================
  // HERO GOLD BOKEH PARTICLES
  // ============================================================
  var HN = mob ? 120 : 280;
  var hP = new Float32Array(HN * 3);
  var hC = new Float32Array(HN * 3);
  var hS = new Float32Array(HN);
  var hV = new Float32Array(HN * 3);
  for (var i = 0; i < HN; i++) {
    hP[i*3] = (Math.random() - 0.5) * 22;
    hP[i*3+1] = (Math.random() - 0.5) * 16;
    hP[i*3+2] = (Math.random() - 0.5) * 10;
    hV[i*3] = (Math.random() - 0.5) * 0.003;
    hV[i*3+1] = -(Math.random() * 0.005 + 0.001);
    hV[i*3+2] = (Math.random() - 0.5) * 0.002;
    var rc = Math.random();
    if (rc < 0.55) { hC[i*3] = 0.83; hC[i*3+1] = 0.68; hC[i*3+2] = 0.22; }
    else if (rc < 0.75) { hC[i*3] = 0.98; hC[i*3+1] = 0.44; hC[i*3+2] = 0.18; }
    else if (rc < 0.88) { hC[i*3] = 1.0; hC[i*3+1] = 0.85; hC[i*3+2] = 0.5; }
    else { hC[i*3] = 1.0; hC[i*3+1] = 1.0; hC[i*3+2] = 0.9; }
    hS[i] = 0.8 + Math.random() * 1.8;
  }
  var hGeo = makeParticleSystem(HN, hP, hC, hS);
  scene.add(new THREE.Points(hGeo, makeParticleMat(230, renderer.getPixelRatio())));

  // ============================================================
  // SPINE &mdash; vertebrae segments
  // ============================================================
  var spineGroup = new THREE.Group();
  scene.add(spineGroup);

  // Core line
  spineGroup.add(new THREE.Mesh(
    new THREE.CylinderGeometry(0.006, 0.006, 130, 5),
    new THREE.MeshBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.3 })
  ));

  var spineColors = [0x3a3a4a, 0x3a3a4a, 0x5a4a7a, 0xb068d4, 0xc078d4, 0x7744ee, 0x5522cc, 0x1a4a5a];
  for (var si = 0; si < 32; si++) {
    var sy = si * (-2.0);
    var sc = spineColors[Math.floor(si / 4)];
    var vg = new THREE.Group();
    vg.position.y = sy;

    // Main body
    var bodyMat = new THREE.MeshStandardMaterial({
      color: sc, metalness: 0.7, roughness: 0.3,
      emissive: sc, emissiveIntensity: 0.2
    });
    var body = new THREE.Mesh(new THREE.SphereGeometry(0.28, 10, 8), bodyMat);
    body.scale.y = 0.38;
    vg.add(body);

    // Protrusions
    var prMat = new THREE.MeshStandardMaterial({
      color: sc, metalness: 0.8, roughness: 0.2,
      emissive: sc, emissiveIntensity: 0.3
    });
    var angles = [0, 120, 240];
    for (var pi2 = 0; pi2 < 3; pi2++) {
      var pa = angles[pi2] * (Math.PI / 180);
      var pr = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.055, 0.22, 5), prMat);
      pr.position.set(Math.cos(pa) * 0.18, 0, Math.sin(pa) * 0.18);
      pr.rotation.z = pa + Math.PI / 2;
      vg.add(pr);
    }

    spineGroup.add(vg);
  }

  // ============================================================
  // CONFETTI PARTICLES (cards zone)
  // ============================================================
  var CN = mob ? 200 : 400;
  var cP = new Float32Array(CN * 3);
  var cC = new Float32Array(CN * 3);
  var cS = new Float32Array(CN);
  var cV = new Float32Array(CN * 3);
  var confColors = [
    [1.0, 0.41, 0.71],  // pink
    [0.1, 0.92, 0.87],  // cyan
    [0.27, 0.96, 0.25], // green
    [0.27, 0.53, 1.0],  // blue
    [0.54, 0.27, 1.0],  // purple
    [1.0, 0.85, 0.0]    // yellow
  ];
  for (var i = 0; i < CN; i++) {
    cP[i*3] = (Math.random() - 0.5) * 18;
    cP[i*3+1] = -8 - Math.random() * 46;
    cP[i*3+2] = (Math.random() - 0.5) * 10;
    cV[i*3] = (Math.random() - 0.5) * 0.005;
    cV[i*3+1] = (Math.random() - 0.5) * 0.003;
    cV[i*3+2] = (Math.random() - 0.5) * 0.004;
    var cc = confColors[Math.floor(Math.random() * confColors.length)];
    cC[i*3] = cc[0]; cC[i*3+1] = cc[1]; cC[i*3+2] = cc[2];
    cS[i] = 0.5 + Math.random() * 1.0;
  }
  var cGeo = makeParticleSystem(CN, cP, cC, cS);
  scene.add(new THREE.Points(cGeo, makeParticleMat(110, renderer.getPixelRatio())));

  // ============================================================
  // CARDS (5 glass panels)
  // ============================================================
  var cardDefs = [
    { label: 'DIGITAL\nTRANSFORMATION', col: 0x02050f, border: 0x1aeade, x: -3.5, y: -12, z: 1.0, ry: 0.3 },
    { label: 'SOCIAL\nMEDIA',           col: 0x030d08, border: 0x46f441, x: 3.5,  y: -21, z: -1.0, ry: -0.3 },
    { label: 'TRADING\nSYSTEMS',        col: 0x0a0802, border: 0xd4af37, x: -3.5, y: -30, z: 1.0, ry: 0.3 },
    { label: 'XR / AI\nEXPERIENCES',   col: 0x080212, border: 0x8a45ff, x: 3.5,  y: -39, z: -1.0, ry: -0.3 },
    { label: 'E-COMMERCE',              col: 0x020a0e, border: 0x4488ff, x: 0,    y: -47, z: 3.0, ry: 0.0 }
  ];

  var cards3D = cardDefs.map(function(cd) {
    var g = new THREE.Group();
    // Body
    var bodyMat = new THREE.MeshStandardMaterial({
      color: cd.col, metalness: 0.5, roughness: 0.2,
      transparent: true, opacity: 0.9, side: THREE.DoubleSide
    });
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(3.2, 2.0), bodyMat));
    // Border
    g.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(3.2, 2.0)),
      new THREE.LineBasicMaterial({ color: cd.border, transparent: true, opacity: 0.6 })
    ));
    // Canvas texture
    var cv2 = document.createElement('canvas'); cv2.width = 480; cv2.height = 300;
    var cx2 = cv2.getContext('2d');
    cx2.clearRect(0, 0, 480, 300);
    // Gradient bg
    var grd = cx2.createLinearGradient(0, 0, 480, 300);
    grd.addColorStop(0, 'rgba(255,255,255,0.06)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    cx2.fillStyle = grd; cx2.fillRect(0, 0, 480, 300);
    // Border
    var hex = '#' + cd.border.toString(16).padStart(6, '0');
    cx2.strokeStyle = hex + '55'; cx2.lineWidth = 1.5;
    cx2.strokeRect(2, 2, 476, 296);
    // Title
    cx2.fillStyle = '#ffffff'; cx2.font = 'bold 46px Courier New'; cx2.textAlign = 'left';
    cd.label.split('\n').forEach(function(ln, li) { cx2.fillText(ln, 28, 120 + li * 54); });
    var tex2 = new THREE.CanvasTexture(cv2);
    g.add(new THREE.Mesh(new THREE.PlaneGeometry(3.2, 2.0),
      new THREE.MeshBasicMaterial({ map: tex2, transparent: true, side: THREE.DoubleSide, depthWrite: false })));
    g.position.set(cd.x, cd.y, cd.z);
    g.rotation.y = cd.ry;
    g.userData = { baseY: cd.y };
    g.visible = false;
    scene.add(g);
    return g;
  });

  // ============================================================
  // THE LAB
  // ============================================================
  var labGroup = new THREE.Group();
  labGroup.position.y = -65;
  labGroup.visible = false;
  scene.add(labGroup);

  // Platform
  labGroup.add(new THREE.Mesh(
    new THREE.CylinderGeometry(3.5, 3.5, 0.18, 32),
    new THREE.MeshStandardMaterial({ color: 0x0a0a14, metalness: 0.85, roughness: 0.15 })
  ));
  labGroup.children[0].position.y = -6;

  // Cage bars (8 vertical)
  var barMat = new THREE.MeshStandardMaterial({ color: 0x15151f, metalness: 0.9, roughness: 0.2 });
  for (var bi = 0; bi < 8; bi++) {
    var ba = (bi / 8) * Math.PI * 2;
    var bar = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.028, 13, 5), barMat);
    bar.position.set(Math.cos(ba) * 4, -0.5, Math.sin(ba) * 4);
    labGroup.add(bar);
  }

  // Top ring
  labGroup.add(new THREE.Mesh(
    new THREE.TorusGeometry(4, 0.04, 8, 60),
    new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 0.9, roughness: 0.1 })
  ));
  labGroup.children[labGroup.children.length - 1].position.y = 6;

  // Horizontal rings at different heights
  [-2, 0, 2.5].forEach(function(yy) {
    labGroup.add(new THREE.Mesh(
      new THREE.TorusGeometry(3.9, 0.006, 4, 50),
      new THREE.MeshBasicMaterial({ color: 0x223344, transparent: true, opacity: 0.3 })
    ));
    labGroup.children[labGroup.children.length - 1].position.y = yy;
  });

  // Hanging wires (12 lines from top ring to platform)
  for (var wi = 0; wi < 12; wi++) {
    var wa = (wi / 12) * Math.PI * 2;
    var wr = 3.8 + (Math.random() - 0.5) * 0.4;
    var wGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(Math.cos(wa) * wr, 6, Math.sin(wa) * wr),
      new THREE.Vector3(Math.cos(wa) * wr * 0.85, -6, Math.sin(wa) * wr * 0.85)
    ]);
    labGroup.add(new THREE.Line(wGeo,
      new THREE.LineBasicMaterial({ color: 0x223344, transparent: true, opacity: 0.4 })));
  }

  // PARTICLE WREATH &mdash; torus distribution
  var WN = 280;
  var wP = new Float32Array(WN * 3);
  var wC = new Float32Array(WN * 3);
  var wS = new Float32Array(WN);
  var MR = 2.5, mr = 0.55;
  for (var i = 0; i < WN; i++) {
    var ua = Math.random() * Math.PI * 2;
    var va = Math.random() * Math.PI * 2;
    var rx = (MR + mr * Math.cos(va)) * Math.cos(ua);
    var ry2 = mr * Math.sin(va);
    var rz = (MR + mr * Math.cos(va)) * Math.sin(ua);
    wP[i*3] = rx + (Math.random() - 0.5) * 0.15;
    wP[i*3+1] = ry2 + (Math.random() - 0.5) * 0.15;
    wP[i*3+2] = rz + (Math.random() - 0.5) * 0.15;
    var wrc = Math.random();
    if (wrc < 0.35) { wC[i*3] = 0.27; wC[i*3+1] = 0.96; wC[i*3+2] = 0.25; } // green
    else if (wrc < 0.65) { wC[i*3] = 0.54; wC[i*3+1] = 0.27; wC[i*3+2] = 1.0; } // purple
    else if (wrc < 0.82) { wC[i*3] = 0.9; wC[i*3+1] = 0.95; wC[i*3+2] = 1.0; } // white
    else { wC[i*3] = 0.1; wC[i*3+1] = 0.92; wC[i*3+2] = 0.87; } // teal
    wS[i] = 1.0 + Math.random() * 1.5;
  }
  var wGeo2 = makeParticleSystem(WN, wP, wC, wS);
  var wreathGroup = new THREE.Group();
  wreathGroup.add(new THREE.Points(wGeo2, makeParticleMat(190, renderer.getPixelRatio())));
  labGroup.add(wreathGroup);

  // Central orb in lab
  labGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 20, 20),
    new THREE.MeshStandardMaterial({
      color: 0x7a2fee, emissive: 0x5a0fcc, emissiveIntensity: 1.0,
      transparent: true, opacity: 0.7
    })
  ));

  // ============================================================
  // MOUSE + SCROLL
  // ============================================================
  var mouse = { tx: 0, ty: 0, x: 0, y: 0 };
  window.addEventListener('mousemove', function(e) {
    mouse.tx = (e.clientX / W) * 2 - 1;
    mouse.ty = -(e.clientY / H) * 2 + 1;
  });

  var scrollP = 0;
  window.addEventListener('scroll', function() {
    var max = document.getElementById('scroll-space').scrollHeight - window.innerHeight;
    scrollP = max > 0 ? Math.min(1, window.scrollY / max) : 0;
  }, { passive: true });

  // Smooth camera state
  var camPos = { x: 0, y: 1, z: 10 };
  var camLook = { x: 0, y: 0, z: 0 };
  var lookVec = new THREE.Vector3();

  // DOM refs
  var shEl = document.getElementById('sh');
  var heroEl = document.getElementById('hero');
  var sideEl = document.getElementById('sidebar');
  var labEl = document.getElementById('labtxt');

  // ============================================================
  // RENDER LOOP
  // ============================================================
  var clock = new THREE.Clock();
  var t = 0;

  function lerp(a, b, v) { return a + (b - a) * v; }

  function animate() {
    requestAnimationFrame(animate);
    t = clock.getElapsedTime();

    mouse.x += (mouse.tx - mouse.x) * 0.06;
    mouse.y += (mouse.ty - mouse.y) * 0.06;

    var sp = scrollP;

    // Target camera position
    var tx, ty, tz, tlx, tly, tlz;
    if (sp < 0.15) {
      var pv = sp / 0.15;
      tx = 0; ty = 1 - pv * 0.5; tz = 10 - pv * 5;
      tlx = 0; tly = 0; tlz = 0;
    } else if (sp < 0.30) {
      var pv = (sp - 0.15) / 0.15;
      tx = pv * 1.5; ty = 0.5 - pv * 2.5; tz = 5 + pv * 2;
      tlx = 0; tly = -1; tlz = 0;
    } else if (sp < 0.65) {
      var pv = (sp - 0.30) / 0.35;
      var ang = pv * Math.PI * 2.2;
      tx = Math.cos(ang) * 3.5;
      ty = -3 - pv * 44;
      tz = 7 + Math.sin(ang) * 1.8;
      tlx = 0; tly = ty - 1; tlz = 0;
    } else if (sp < 0.82) {
      var pv = (sp - 0.65) / 0.17;
      tx = 0; ty = -47 - pv * 18; tz = 8 - pv * 3;
      tlx = 0; tly = -70; tlz = 0;
    } else {
      var pv = (sp - 0.82) / 0.18;
      tx = 0; ty = -65 + pv * 66; tz = 5 + pv * 5;
      tlx = 0; tly = ty + lerp(-5, 2, pv); tlz = 0;
    }

    // Smooth camera
    var ks = 0.07;
    camPos.x += (tx + mouse.x * 0.25 - camPos.x) * ks;
    camPos.y += (ty + mouse.y * 0.18 - camPos.y) * ks;
    camPos.z += (tz - camPos.z) * ks;
    camLook.x += (tlx - camLook.x) * ks;
    camLook.y += (tly - camLook.y) * ks;
    camLook.z += (tlz - camLook.z) * ks;
    camera.position.set(camPos.x, camPos.y, camPos.z);
    lookVec.set(camLook.x, camLook.y, camLook.z);
    camera.lookAt(lookVec);

    movL.position.set(mouse.x * 5, camPos.y + mouse.y * 3 + 2, camPos.z - 2);

    // Logo animation
    logoGroup.position.y = Math.sin(t * 0.35) * 0.16;
    logoGroup.rotation.y = t * 0.05 + mouse.x * 0.08;
    logoGroup.rotation.x = mouse.y * 0.05;
    // Fade logo on scroll
    var logoVis = sp < 0.08 ? 1 : sp < 0.18 ? 1 - (sp - 0.08) / 0.10 : 0;
    logoGroup.visible = logoVis > 0.02;
    if (logoGroup.visible) logoGroup.scale.setScalar(1 - (1 - logoVis) * 0.2);
    // Return visibility
    if (sp > 0.88) {
      var rv = (sp - 0.88) / 0.12;
      logoGroup.visible = true;
      logoGroup.scale.setScalar(rv);
    }

    // Spine slow rotation
    spineGroup.rotation.y = t * 0.015;
    spineGroup.rotation.z = Math.sin(t * 0.1) * 0.008;

    // Cards
    var cardVisStart = 0.28;
    cards3D.forEach(function(c, ci) {
      var lo = cardVisStart + ci * 0.065;
      var hi = lo + 0.18;
      c.visible = sp > lo && sp < 0.68;
      if (c.visible) {
        c.position.y = c.userData.baseY + Math.sin(t * 0.3 + ci) * 0.09;
      }
    });

    // Lab
    labGroup.visible = sp > 0.60 && sp < 0.94;
    if (labGroup.visible) {
      wreathGroup.rotation.y = t * 0.08;
      labGroup.rotation.y = Math.sin(t * 0.05) * 0.02;
    }

    // Hero particles drift
    for (var i = 0; i < HN; i++) {
      hP[i*3] += hV[i*3];
      hP[i*3+1] += hV[i*3+1];
      hP[i*3+2] += hV[i*3+2];
      if (hP[i*3+1] < -9) { hP[i*3+1] = 9; hP[i*3] = (Math.random() - 0.5) * 22; }
    }
    hGeo.attributes.position.needsUpdate = true;

    // Confetti gentle drift
    for (var i = 0; i < CN; i++) {
      cP[i*3] += cV[i*3];
      cP[i*3+1] += cV[i*3+1];
      cP[i*3+2] += cV[i*3+2];
    }
    cGeo.attributes.position.needsUpdate = true;

    // Overlays
    shEl.style.opacity = sp < 0.04 ? '1' : '0';
    heroEl.style.opacity = (sp > 0.14 && sp < 0.28) ? '1' : '0';
    sideEl.style.opacity = (sp > 0.29 && sp < 0.63) ? '1' : '0';
    labEl.style.opacity = (sp > 0.61 && sp < 0.87) ? '1' : '0';

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', function() {
    W = window.innerWidth; H = window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

  animate();
  console.log('M7 v3 ready | THREE r' + THREE.REVISION);
}

init();
})();
</script>
</body>
</html>
