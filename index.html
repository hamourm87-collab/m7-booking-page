<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Active Theory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000811;overflow-x:hidden;font-family:'Courier New',Courier,monospace;color:#fff}
#ss{height:800vh}
#cw{position:fixed;inset:0;z-index:0}
canvas{display:block;width:100%!important;height:100%!important}
/* VIGNETTE */
#vig{position:fixed;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse 90% 85% at 50% 50%,transparent 28%,rgba(0,4,14,0.55) 65%,rgba(0,2,10,0.92) 100%)}
/* NAV — floats with scroll inertia */
#nav{position:fixed;top:26px;left:50%;z-index:100;
  display:flex;align-items:center;padding:10px 28px;gap:4px;
  border:1px solid rgba(255,255,255,0.12);border-radius:28px;
  background:rgba(0,6,20,0.5);backdrop-filter:blur(18px);
  transform:translateX(-50%);transition:transform 0.05s;white-space:nowrap}
.nl{font-size:10px;letter-spacing:3px;color:rgba(210,220,255,0.72);text-decoration:none}
.ns{color:rgba(255,255,255,0.18);margin:0 10px}
/* SCROLL HINT */
#sh{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;transition:opacity 0.6s;pointer-events:none}
#sh span{display:block;font-size:9px;letter-spacing:5px;color:rgba(200,215,255,0.32)}
#sh-ln{width:1px;height:26px;margin:7px auto 0;
  background:linear-gradient(to bottom,rgba(200,215,255,0.38),transparent);
  animation:shlp 1.9s ease-in-out infinite}
@keyframes shlp{0%,100%{transform:scaleY(0);transform-origin:top}58%{transform:scaleY(1);transform-origin:top}}
/* OVERLAYS */
.ov{position:fixed;z-index:10;pointer-events:none;opacity:0;transition:opacity 0.65s}
/* WHAT ARE YOU LOOKING FOR sidebar */
#waylf{left:5%;top:50%;transform:translateY(-50%);
  background:rgba(0,5,18,0.82);backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:22px 20px;min-width:215px}
#waylf h4{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.75);margin-bottom:10px;line-height:1.5}
.sd{height:1px;background:rgba(255,255,255,0.08);margin:10px 0}
.sl{display:block;font-size:10px;letter-spacing:1px;color:#1aeade;margin:7px 0;text-decoration:none;pointer-events:all;transition:color 0.18s}
.sl:hover{color:#fff}
#ask{margin-top:12px;width:100%;padding:9px 14px;background:transparent;
  border:1px solid rgba(255,255,255,0.15);border-radius:18px;
  color:#fff;font-size:9px;letter-spacing:1px;outline:none;font-family:inherit}
#ask::placeholder{color:rgba(255,255,255,0.3)}
/* HERO TEXT (behind 3D, appears during camera move) */
#hero{left:7%;top:50%;transform:translateY(-50%);max-width:360px}
#hero h1{font-size:clamp(26px,4.5vw,58px);letter-spacing:5px;line-height:1.06;
  background:linear-gradient(135deg,rgba(255,255,255,0.95) 50%,rgba(160,200,255,0.7));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#hero p{font-size:9px;letter-spacing:4px;color:rgba(180,200,255,0.45);margin-top:12px}
/* LAB TEXT */
#labt{bottom:13%;left:4%;text-align:left}
#labt h2{font-size:clamp(18px,3vw,38px);letter-spacing:6px}
#labt p{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:8px}
</style>
</head>
<body>
<div id="vig"></div>
<div id="cw"><canvas id="c"></canvas></div>
<div id="ss"></div>

<div id="nav">
  <a href="#" class="nl">WORK</a>
  <span class="ns">&mdash;</span>
  <a href="#" class="nl">CONTACT</a>
</div>

<div id="sh"><span>SCROLL</span><div id="sh-ln"></div></div>

<div class="ov" id="waylf">
  <h4>WHAT ARE YOU<br>LOOKING FOR?</h4>
  <div class="sd"></div>
  <a href="#" class="sl">-&gt; WEBSITES</a>
  <a href="#" class="sl">-&gt; INSTALLATIONS</a>
  <a href="#" class="sl">-&gt; XR / VR / AI</a>
  <a href="#" class="sl">-&gt; MULTIPLAYER</a>
  <a href="#" class="sl">-&gt; GAMES</a>
  <div class="sd"></div>
  <input id="ask" placeholder="ASK ME ANYTHING...">
</div>

<div class="ov" id="hero">
  <h1>CREATIVE<br>DIGITAL<br>EXPERIENCES</h1>
  <p>FOUNDED IN 2012</p>
</div>

<div class="ov" id="labt">
  <h2>// THE LAB -&gt;</h2>
  <p>OUR HOME FOR INNOVATION.<br>WHERE PROTOTYPES TURN INTO<br>PRODUCTION PROJECTS.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
(function() {
'use strict';

// Wait for THREE
function boot() {
  if (typeof THREE === 'undefined') { setTimeout(boot, 80); return; }
  try { main(); } catch(e) { console.error('M7 init error:', e); }
}

function main() {
  var mob = window.innerWidth < 768;
  var W = window.innerWidth, H = window.innerHeight;
  var PR = Math.min(window.devicePixelRatio || 1, mob ? 1.5 : 2);

  // ?? RENDERER
  var canvas = document.getElementById('c');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: !mob, alpha: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(PR);
  renderer.setClearColor(0x000811);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  // ?? SCENE + FOG
  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000811, 0.013);

  // ?? CAMERA
  var camera = new THREE.PerspectiveCamera(54, W / H, 0.1, 180);
  camera.position.set(0, 1.5, 11);
  var camPos = { x: 0, y: 1.5, z: 11 };
  var camLook = { x: 0, y: 0, z: 0 };
  var lookV = new THREE.Vector3();

  // ?? LIGHTS
  scene.add(new THREE.AmbientLight(0x04081a, 5));
  var kL = new THREE.PointLight(0xffc87a, 3.5, 38);
  kL.position.set(4, 6, 9); scene.add(kL);
  var fL = new THREE.PointLight(0x4466cc, 2, 28);
  fL.position.set(-5, -1, 5); scene.add(fL);
  var rL = new THREE.PointLight(0x7744bb, 1.5, 20);
  rL.position.set(0, -4, -3); scene.add(rL);
  var labPL = new THREE.PointLight(0x22ee44, 4, 26);
  labPL.position.set(0, -68, 2); scene.add(labPL);
  var movL = new THREE.PointLight(0x5577bb, 1.5, 12);
  scene.add(movL);

  // ?? PARTICLE SHADER (shared)
  function pMat(szF) {
    return new THREE.ShaderMaterial({
      uniforms: { uPR: { value: PR } },
      vertexShader: [
        'attribute vec3 aColor; attribute float aSize; uniform float uPR;',
        'varying vec3 vC;',
        'void main() {',
        '  vC = aColor;',
        '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
        '  gl_Position = projectionMatrix * mv;',
        '  gl_PointSize = aSize * uPR * (' + szF.toFixed(1) + ' / -mv.z);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'varying vec3 vC;',
        'void main() {',
        '  float d = length(gl_PointCoord - vec2(0.5));',
        '  if (d > 0.5) discard;',
        '  float s = 1.0 - smoothstep(0.0, 0.5, d);',
        '  float g = 1.0 - smoothstep(0.0, 0.2, d);',
        '  gl_FragColor = vec4(vC + vC * g * 0.45, s * 0.93);',
        '}'
      ].join('\n'),
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
  }

  function pGeo(pos, col, siz) {
    var g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
    g.setAttribute('aSize', new THREE.BufferAttribute(siz, 1));
    return g;
  }

  // ================================================================
  // 1. LOGO ? ring + letter "a" + teardrop wire arms
  // ================================================================
  var logo = new THREE.Group();
  scene.add(logo);

  // Chrome ring (iridescent via multiple lights)
  var ringMat = new THREE.MeshStandardMaterial({
    color: 0x99bbcc, metalness: 1.0, roughness: 0.0,
    emissive: 0x112244, emissiveIntensity: 0.3
  });
  logo.add(new THREE.Mesh(new THREE.TorusGeometry(1.55, 0.044, 20, 100), ringMat));

  // Inner thin ring
  logo.add(new THREE.Mesh(
    new THREE.TorusGeometry(1.3, 0.01, 8, 80),
    new THREE.MeshBasicMaterial({ color: 0xaa8833, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending })
  ));

  // "a" letter on canvas inside ring
  var aCV = document.createElement('canvas'); aCV.width = 256; aCV.height = 256;
  var aCX = aCV.getContext('2d');
  aCX.fillStyle = 'rgba(255,255,255,0.06)';
  aCX.beginPath(); aCX.arc(128, 128, 110, 0, Math.PI * 2); aCX.fill();
  aCX.fillStyle = 'rgba(255,255,255,0.85)';
  aCX.font = 'italic bold 140px serif';
  aCX.textAlign = 'center'; aCX.textBaseline = 'middle';
  aCX.fillText('a', 128, 138);
  var aTex = new THREE.CanvasTexture(aCV);
  logo.add(new THREE.Mesh(
    new THREE.PlaneGeometry(2.7, 2.7),
    new THREE.MeshBasicMaterial({ map: aTex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
  ));

  // Wire arms ? teardrop shape above ring (TubeGeometry from CatmullRomCurve3)
  var armMat2 = new THREE.MeshStandardMaterial({
    color: 0xb86040, metalness: 0.95, roughness: 0.05,
    emissive: 0x441100, emissiveIntensity: 0.5
  });
  function arm(pts) {
    var crv = new THREE.CatmullRomCurve3(pts);
    return new THREE.Mesh(new THREE.TubeGeometry(crv, 22, 0.011, 5, false), armMat2);
  }
  // Left: starts ring top-left, curves up and inward, meets at top point
  logo.add(arm([
    new THREE.Vector3(-0.85, 0.1, 0),
    new THREE.Vector3(-1.9, 1.3, 0),
    new THREE.Vector3(-0.4, 2.8, 0),
    new THREE.Vector3(0.0, 3.9, 0)
  ]));
  // Right: mirror
  logo.add(arm([
    new THREE.Vector3(0.85, 0.1, 0),
    new THREE.Vector3(1.9, 1.3, 0),
    new THREE.Vector3(0.4, 2.8, 0),
    new THREE.Vector3(0.0, 3.9, 0)
  ]));

  // Prismatic arc bottom-right
  var arcC2 = new THREE.EllipseCurve(0, 0, 0.2, 0.2, -0.15, Math.PI * 1.5, false, 0);
  var arcPts2 = arcC2.getPoints(28).map(function(p) { return new THREE.Vector3(p.x, p.y, 0); });
  var arcL = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(arcPts2),
    new THREE.LineBasicMaterial({ color: 0xffd060 })
  );
  arcL.position.set(0.88, -1.68, 0);
  logo.add(arcL);

  // Hero bokeh around logo
  var HBN = mob ? 100 : 220;
  var hbP = new Float32Array(HBN * 3), hbC = new Float32Array(HBN * 3), hbS = new Float32Array(HBN);
  var hbV = new Float32Array(HBN * 3);
  var hbCols = [[0.85,0.68,0.18],[1.0,0.44,0.15],[1.0,0.82,0.45],[0.95,0.95,0.85]];
  for (var i = 0; i < HBN; i++) {
    hbP[i*3]=(Math.random()-0.5)*24; hbP[i*3+1]=(Math.random()-0.5)*18; hbP[i*3+2]=(Math.random()-0.5)*10;
    hbV[i*3]=(Math.random()-0.5)*0.003; hbV[i*3+1]=-(Math.random()*0.005+0.001); hbV[i*3+2]=(Math.random()-0.5)*0.002;
    var hc = hbCols[Math.floor(Math.random()*hbCols.length)];
    hbC[i*3]=hc[0]; hbC[i*3+1]=hc[1]; hbC[i*3+2]=hc[2];
    hbS[i]=0.7+Math.random()*1.8;
  }
  var heroBokehGeo = pGeo(hbP, hbC, hbS);
  scene.add(new THREE.Points(heroBokehGeo, pMat(240)));

  // ================================================================
  // 2. SPINE ? organic vertebrae, central axis Y=0 to Y=-64
  // ================================================================
  var spineG = new THREE.Group();
  scene.add(spineG);
  // Core thin line
  spineG.add(new THREE.Mesh(
    new THREE.CylinderGeometry(0.005, 0.005, 130, 4),
    new THREE.MeshBasicMaterial({ color: 0x223344, transparent: true, opacity: 0.22 })
  ));

  // Color ramp for vertebrae
  var spColors = [
    new THREE.Color(0x3a3848), // 0-7: dark metallic
    new THREE.Color(0x6a4888), // 8-15: violet
    new THREE.Color(0xc068d0), // 16-22: pink
    new THREE.Color(0x7744ee), // 23-28: purple
    new THREE.Color(0x1a4860)  // 29-32: teal
  ];
  function spineColor(idx) {
    if (idx < 8)  return spColors[0];
    if (idx < 16) return spColors[1];
    if (idx < 23) return spColors[2];
    if (idx < 29) return spColors[3];
    return spColors[4];
  }

  for (var si = 0; si < 33; si++) {
    var sy = si * (-2.0);
    var sc = spineColor(si);
    var vrt = new THREE.Group();
    vrt.position.y = sy;
    // Main body ? squashed sphere
    var vMat = new THREE.MeshStandardMaterial({
      color: sc, metalness: 0.75, roughness: 0.28,
      emissive: sc, emissiveIntensity: 0.18
    });
    var vBody = new THREE.Mesh(new THREE.SphereGeometry(0.26, 10, 8), vMat);
    vBody.scale.y = 0.36;
    vrt.add(vBody);
    // 3 protrusions
    var prMat2 = new THREE.MeshStandardMaterial({ color: sc, metalness: 0.85, roughness: 0.2, emissive: sc, emissiveIntensity: 0.25 });
    for (var pj = 0; pj < 3; pj++) {
      var pa = (pj / 3) * Math.PI * 2 + si * 0.3;
      var pMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.055, 0.22, 5), prMat2);
      pMesh.position.set(Math.cos(pa) * 0.19, 0, Math.sin(pa) * 0.19);
      pMesh.rotation.z = Math.atan2(Math.sin(pa), Math.cos(pa));
      pMesh.rotation.x = Math.PI / 2;
      vrt.add(pMesh);
    }
    spineG.add(vrt);
  }

  // ================================================================
  // 3. CONFETTI PARTICLES ? exploding from spine (cards zone)
  // ================================================================
  var CN = mob ? 200 : 420;
  var cP2 = new Float32Array(CN * 3), cC2 = new Float32Array(CN * 3), cS2 = new Float32Array(CN);
  var cV2 = new Float32Array(CN * 3);
  var cPal = [
    [1.0,0.41,0.71],[1.0,0.41,0.71], // pink (double weight)
    [0.1,0.92,0.87],[0.1,0.92,0.87], // cyan
    [0.27,0.96,0.25],                 // green
    [0.27,0.53,1.0],                  // blue
    [0.54,0.27,1.0],[0.54,0.27,1.0], // purple
    [1.0,0.85,0.0]                    // yellow
  ];
  for (var i = 0; i < CN; i++) {
    // Distributed in a cylinder around the spine (radius 1-8, Y -6 to -62)
    var cr = 1.5 + Math.random() * 7;
    var ca = Math.random() * Math.PI * 2;
    cP2[i*3] = Math.cos(ca) * cr;
    cP2[i*3+1] = -6 - Math.random() * 56;
    cP2[i*3+2] = Math.sin(ca) * cr;
    cV2[i*3]=(Math.random()-0.5)*0.006; cV2[i*3+1]=(Math.random()-0.5)*0.003; cV2[i*3+2]=(Math.random()-0.5)*0.006;
    var cc2 = cPal[Math.floor(Math.random() * cPal.length)];
    cC2[i*3]=cc2[0]; cC2[i*3+1]=cc2[1]; cC2[i*3+2]=cc2[2];
    cS2[i]=0.45+Math.random()*0.9;
  }
  var confGeo = pGeo(cP2, cC2, cS2);
  scene.add(new THREE.Points(confGeo, pMat(115)));

  // ================================================================
  // 4. CARDS ? glass panels with simulated video textures
  //    Placed at fixed orbital positions around the spine
  // ================================================================
  var cardDef = [
    { title: 'WELCOME TO\nHOGWARTS',      sub: 'Harry Potter',  bgA: [0.04,0.06,0.18], bgB: [0.0,0.1,0.24], border: 0x1aeade, orbitA: 0.0,   y: -11 },
    { title: 'MILLION PIECE\nMISSION',     sub: 'Google',        bgA: [0.12,0.04,0.04], bgB: [0.22,0.06,0.02], border: 0xfdb460, orbitA: 1.26,  y: -20 },
    { title: 'DISCOVER YOUR\nPATRONUS',    sub: 'Harry Potter',  bgA: [0.05,0.12,0.06], bgB: [0.0,0.18,0.08], border: 0x46f441, orbitA: 2.51,  y: -29 },
    { title: 'SECRET\nSKY',                sub: 'Secret Sky',    bgA: [0.06,0.04,0.14], bgB: [0.1,0.06,0.22], border: 0x8a45ff, orbitA: 3.77,  y: -38 },
    { title: 'CHILE 22',                   sub: 'Adidas',        bgA: [0.0,0.1,0.1],   bgB: [0.04,0.18,0.14], border: 0x1aeade, orbitA: 5.03,  y: -47 }
  ];

  var orbitR = 3.6; // distance from spine
  var cards = [];
  var cardCanvases = []; // for animation

  cardDef.forEach(function(cd, ci) {
    var grp = new THREE.Group();
    var worldX = Math.cos(cd.orbitA) * orbitR;
    var worldZ = Math.sin(cd.orbitA) * orbitR;
    grp.position.set(worldX, cd.y, worldZ);
    grp.rotation.y = -cd.orbitA + Math.PI * 0.5;

    // Body
    grp.add(new THREE.Mesh(
      new THREE.PlaneGeometry(3.4, 2.1),
      new THREE.MeshStandardMaterial({ color: 0x010408, metalness: 0.4, roughness: 0.3, transparent: true, opacity: 0.92, side: THREE.DoubleSide })
    ));
    // Border glow
    grp.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(3.4, 2.1)),
      new THREE.LineBasicMaterial({ color: cd.border, transparent: true, opacity: 0.5 })
    ));

    // Animated canvas texture (simulate video)
    var cv3 = document.createElement('canvas'); cv3.width = 512; cv3.height = 316;
    var cx3 = cv3.getContext('2d');
    cardCanvases.push({ cv: cv3, cx: cx3, cd: cd, frame: 0 });

    var tex3 = new THREE.CanvasTexture(cv3);
    tex3.needsUpdate = true;

    // Draw initial frame
    drawCard(cx3, cd, 0, tex3, cv3);

    grp.add(new THREE.Mesh(
      new THREE.PlaneGeometry(3.4, 2.1),
      new THREE.MeshBasicMaterial({ map: tex3, transparent: true, side: THREE.DoubleSide, depthWrite: false })
    ));

    grp.visible = false;
    grp.userData = { baseY: cd.y, orbitA: cd.orbitA, tex: tex3, cvIdx: ci };
    scene.add(grp);
    cards.push(grp);
  });

  function drawCard(cx, cd, frame, tex, cv) {
    var w = cv.width, h = cv.height;
    cx.clearRect(0, 0, w, h);
    // Animated gradient bg (simulate video)
    var shift = (frame * 0.008) % 1;
    var grd = cx.createLinearGradient(0, 0, w, h);
    var r0 = cd.bgA, r1 = cd.bgB;
    grd.addColorStop(0, 'rgba(' + Math.round(r0[0]*255+shift*15) + ',' + Math.round(r0[1]*255) + ',' + Math.round(r0[2]*255) + ',1)');
    grd.addColorStop(1, 'rgba(' + Math.round(r1[0]*255) + ',' + Math.round(r1[1]*255) + ',' + Math.round(r1[2]*255+shift*12) + ',1)');
    cx.fillStyle = grd; cx.fillRect(0, 0, w, h);
    // Subtle pattern
    cx.fillStyle = 'rgba(255,255,255,' + (0.012 + Math.sin(frame * 0.04) * 0.008) + ')';
    for (var pi3 = 0; pi3 < 6; pi3++) {
      var px2 = Math.sin(frame * 0.02 + pi3 * 1.1) * w * 0.4 + w * 0.5;
      var py2 = Math.cos(frame * 0.015 + pi3 * 0.9) * h * 0.35 + h * 0.5;
      var pr2 = 30 + Math.sin(frame * 0.03 + pi3) * 15;
      cx.beginPath(); cx.arc(px2, py2, pr2, 0, Math.PI * 2); cx.fill();
    }
    // Border
    var hx = '#' + cd.border.toString(16).padStart(6, '0');
    cx.strokeStyle = hx + '44'; cx.lineWidth = 2; cx.strokeRect(2, 2, w - 4, h - 4);
    // Sub label
    cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = 'bold 18px Courier New'; cx.textAlign = 'left';
    cx.fillText(cd.sub.toUpperCase(), 22, 42);
    cx.fillStyle = 'rgba(255,255,255,0.1)'; cx.fillRect(20, 50, 50, 1);
    // Main title
    cx.fillStyle = 'rgba(255,255,255,0.92)'; cx.font = 'bold 46px Courier New';
    cd.title.split('\n').forEach(function(ln, li) { cx.fillText(ln, 22, 120 + li * 54); });
    if (tex) tex.needsUpdate = true;
  }

  // ================================================================
  // 5. THE LAB ? industrial cage + particle wreath
  // ================================================================
  var labG = new THREE.Group();
  labG.position.y = -70;
  labG.visible = false;
  scene.add(labG);

  // Dark reflective platform
  labG.add(new THREE.Mesh(
    new THREE.CylinderGeometry(3.6, 3.6, 0.16, 32),
    new THREE.MeshStandardMaterial({ color: 0x080810, metalness: 0.9, roughness: 0.12 })
  ));
  labG.children[0].position.y = -6.2;

  // CAGE: 8 vertical bars + horizontal rings
  var cageBarMat = new THREE.MeshStandardMaterial({ color: 0x141422, metalness: 0.95, roughness: 0.15 });
  for (var bi = 0; bi < 8; bi++) {
    var ba = (bi / 8) * Math.PI * 2;
    var bar = new THREE.Mesh(new THREE.CylinderGeometry(0.026, 0.026, 14, 5), cageBarMat);
    bar.position.set(Math.cos(ba) * 4.1, -0.2, Math.sin(ba) * 4.1);
    labG.add(bar);
  }
  // Top circular frame
  labG.add(new THREE.Mesh(
    new THREE.TorusGeometry(4.1, 0.038, 8, 64),
    new THREE.MeshStandardMaterial({ color: 0x1a1a2e, metalness: 0.9, roughness: 0.12 })
  ));
  labG.children[labG.children.length - 1].position.y = 6.8;

  // Horizontal rings inside cage
  [-2.5, 0, 3.0].forEach(function(hy) {
    var hring = new THREE.Mesh(
      new THREE.TorusGeometry(3.85, 0.008, 6, 52),
      new THREE.MeshBasicMaterial({ color: 0x223355, transparent: true, opacity: 0.28 })
    );
    hring.position.y = hy;
    labG.add(hring);
  });

  // Hanging wires (14 lines)
  for (var wi = 0; wi < 14; wi++) {
    var wa = (wi / 14) * Math.PI * 2;
    var wr2 = 3.7 + (Math.random() - 0.5) * 0.5;
    var wpts = [
      new THREE.Vector3(Math.cos(wa) * wr2, 6.8, Math.sin(wa) * wr2),
      new THREE.Vector3(Math.cos(wa) * wr2 * 0.9 + (Math.random()-0.5)*0.3, -6.2, Math.sin(wa) * wr2 * 0.9 + (Math.random()-0.5)*0.3)
    ];
    labG.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(wpts),
      new THREE.LineBasicMaterial({ color: 0x1a2233, transparent: true, opacity: 0.38 })
    ));
  }

  // PARTICLE WREATH ? torus-distributed confetti
  var WN = mob ? 180 : 320;
  var wPos = new Float32Array(WN * 3), wCol = new Float32Array(WN * 3), wSiz = new Float32Array(WN);
  var WR = 2.55, Wt = 0.58; // major/minor radius
  for (var i = 0; i < WN; i++) {
    var wu = Math.random() * Math.PI * 2, wv = Math.random() * Math.PI * 2;
    wPos[i*3] = (WR + Wt * Math.cos(wv)) * Math.cos(wu) + (Math.random()-0.5)*0.14;
    wPos[i*3+1] = Wt * Math.sin(wv) + (Math.random()-0.5)*0.14;
    wPos[i*3+2] = (WR + Wt * Math.cos(wv)) * Math.sin(wu) + (Math.random()-0.5)*0.14;
    var wrc = Math.random();
    if (wrc < 0.3)      { wCol[i*3]=0.25;wCol[i*3+1]=0.95;wCol[i*3+2]=0.22; }
    else if (wrc < 0.58){ wCol[i*3]=0.52;wCol[i*3+1]=0.25;wCol[i*3+2]=1.0; }
    else if (wrc < 0.78){ wCol[i*3]=0.92;wCol[i*3+1]=0.96;wCol[i*3+2]=1.0; }
    else                { wCol[i*3]=0.08;wCol[i*3+1]=0.90;wCol[i*3+2]=0.85; }
    wSiz[i]=1.0+Math.random()*1.6;
  }
  var wreathGeo = pGeo(wPos, wCol, wSiz);
  var wreathMesh = new THREE.Points(wreathGeo, pMat(195));
  var wreathGroup = new THREE.Group();
  wreathGroup.add(wreathMesh);
  labG.add(wreathGroup);

  // Central energy orb
  labG.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.38, 18, 18),
    new THREE.MeshStandardMaterial({ color: 0x55dd22, emissive: 0x33aa00, emissiveIntensity: 1.2, transparent: true, opacity: 0.7 })
  ));

  // ================================================================
  // SCROLL + MOUSE + NAV
  // ================================================================
  var scrollP = 0;
  var lastSY = 0, scrollVel = 0;
  var navEl = document.getElementById('nav');
  var navOffY = 0;

  window.addEventListener('scroll', function() {
    var max = document.getElementById('ss').scrollHeight - window.innerHeight;
    scrollP = max > 0 ? Math.min(1, window.scrollY / max) : 0;
    scrollVel = (window.scrollY - lastSY) * 0.04;
    lastSY = window.scrollY;
  }, { passive: true });

  var mouse = { tx: 0, ty: 0, x: 0, y: 0 };
  window.addEventListener('mousemove', function(e) {
    mouse.tx = (e.clientX / W) * 2 - 1;
    mouse.ty = -(e.clientY / H) * 2 + 1;
  });

  // DOM overlays
  var shEl = document.getElementById('sh');
  var waylfEl = document.getElementById('waylf');
  var heroEl = document.getElementById('hero');
  var labTEl = document.getElementById('labt');

  // ================================================================
  // RENDER LOOP
  // ================================================================
  var clock = new THREE.Clock();
  var t = 0;
  var frame = 0;

  function lerp(a, b, t2) { return a + (b - a) * t2; }
  var K = 0.072; // camera smooth factor

  function animate() {
    requestAnimationFrame(animate);
    t = clock.getElapsedTime();
    frame++;

    // Smooth mouse
    mouse.x += (mouse.tx - mouse.x) * 0.055;
    mouse.y += (mouse.ty - mouse.y) * 0.055;

    var sp = scrollP;

    // ?? CAMERA TARGET based on scroll progress
    var tx2, ty2, tz2, tlx, tly, tlz;

    if (sp < 0.12) {
      // Hero: camera eases forward toward logo
      var pv = sp / 0.12;
      tx2 = 0; ty2 = 1.5 - pv * 0.5; tz2 = 11 - pv * 4.5;
      tlx = 0; tly = 0; tlz = 0;

    } else if (sp < 0.25) {
      // Ring approaches camera / text reveal
      var pv = (sp - 0.12) / 0.13;
      tx2 = pv * 1.2; ty2 = 1.0 - pv * 2.0; tz2 = 6.5 + pv * 1.5;
      tlx = 0; tly = -0.5; tlz = 0;

    } else if (sp < 0.64) {
      // SPIRAL DESCENT around spine (cards zone)
      var pv = (sp - 0.25) / 0.39;
      var angle = pv * Math.PI * 2.4; // ~1.2 full orbits
      var rad = 4.2 + Math.sin(pv * Math.PI) * 0.6;
      tx2 = Math.cos(angle) * rad;
      ty2 = -2 - pv * 46;
      tz2 = 6.5 + Math.sin(angle) * 1.4;
      tlx = 0; tly = ty2 - 0.8; tlz = 0;

    } else if (sp < 0.80) {
      // Descend to lab
      var pv = (sp - 0.64) / 0.16;
      tx2 = lerp(Math.cos(Math.PI * 2.4) * 4.2, 0, pv);
      ty2 = -48 - pv * 22;
      tz2 = 8 - pv * 2.5;
      tlx = 0; tly = -75; tlz = 0;

    } else if (sp < 0.93) {
      // Inside lab
      var pv = (sp - 0.80) / 0.13;
      tx2 = Math.sin(pv * Math.PI * 0.6) * 1.5;
      ty2 = -70 - pv * 3;
      tz2 = 5.5 + Math.sin(pv * Math.PI) * 1;
      tlx = 0; tly = -70; tlz = 0;

    } else {
      // Return to top
      var pv = (sp - 0.93) / 0.07;
      tx2 = 0; ty2 = lerp(-73, 1.5, pv); tz2 = lerp(5.5, 11, pv);
      tlx = 0; tly = lerp(-70, 0, pv); tlz = 0;
    }

    // Apply mouse parallax to target
    tx2 += mouse.x * 0.28;
    ty2 += mouse.y * 0.18;

    // Smooth camera
    camPos.x += (tx2 - camPos.x) * K;
    camPos.y += (ty2 - camPos.y) * K;
    camPos.z += (tz2 - camPos.z) * K;
    camLook.x += (tlx - camLook.x) * K;
    camLook.y += (tly - camLook.y) * K;
    camLook.z += (tlz - camLook.z) * K;

    camera.position.set(camPos.x, camPos.y, camPos.z);
    lookV.set(camLook.x, camLook.y, camLook.z);
    camera.lookAt(lookV);

    // Moving light
    movL.position.set(mouse.x * 5, camPos.y + mouse.y * 3 + 1, camPos.z - 2);

    // ?? NAV floating behavior (elastic with scroll velocity)
    navOffY += (scrollVel * -18 - navOffY) * 0.1;
    scrollVel *= 0.88;
    navEl.style.transform = 'translateX(-50%) translateY(' + navOffY.toFixed(1) + 'px)';

    // ?? LOGO animation
    logo.position.y = Math.sin(t * 0.38) * 0.15;
    logo.rotation.y = t * 0.045 + mouse.x * 0.07;
    logo.rotation.x = mouse.y * 0.045;
    // Fade logo: visible 0-15%, return 93-100%
    var logoVis = sp < 0.08 ? 1 : sp < 0.18 ? 1 - (sp - 0.08) / 0.10 : 0;
    if (sp > 0.90) logoVis = (sp - 0.90) / 0.10;
    logo.visible = logoVis > 0.01;
    if (logo.visible) logo.scale.setScalar(Math.max(0.01, logoVis));

    // ?? SPINE slow sway
    spineG.rotation.y = t * 0.013;
    spineG.rotation.z = Math.sin(t * 0.09) * 0.006;

    // ?? CARDS
    var cStart = 0.26, cRange = 0.04;
    cards.forEach(function(c, ci) {
      var lo = cStart + ci * cRange;
      c.visible = sp > lo && sp < 0.66;
      if (c.visible) {
        // Gentle float
        c.position.y = c.userData.baseY + Math.sin(t * 0.28 + ci) * 0.08;
        // Update animated texture every 3 frames
        if (frame % 3 === 0) {
          var cvd = cardCanvases[ci];
          drawCard(cvd.cx, cvd.cd, frame + ci * 17, c.userData.tex, cvd.cv);
        }
      }
    });

    // ?? LAB
    labG.visible = sp > 0.60 && sp < 0.95;
    if (labG.visible) {
      wreathGroup.rotation.y = t * 0.075;
      // Color-cycle the wreath over time
      var wt = t * 0.4;
      var labC = new THREE.Color();
      labC.setHSL((wt % 1), 0.9, 0.6);
      labPL.color.set(labC);
    }

    // ?? HERO PARTICLES drift
    for (var i = 0; i < HBN; i++) {
      hbP[i*3] += hbV[i*3]; hbP[i*3+1] += hbV[i*3+1]; hbP[i*3+2] += hbV[i*3+2];
      if (hbP[i*3+1] < -10) { hbP[i*3+1] = 10; hbP[i*3] = (Math.random()-0.5)*24; }
    }
    heroBokehGeo.attributes.position.needsUpdate = true;

    // ?? CONFETTI gentle drift
    for (var i = 0; i < CN; i++) {
      cP2[i*3] += cV2[i*3]; cP2[i*3+1] += cV2[i*3+1]; cP2[i*3+2] += cV2[i*3+2];
    }
    confGeo.attributes.position.needsUpdate = true;

    // ?? OVERLAYS
    shEl.style.opacity = sp < 0.04 ? '1' : '0';
    heroEl.style.opacity = (sp > 0.13 && sp < 0.26) ? '1' : '0';
    waylfEl.style.opacity = (sp > 0.27 && sp < 0.64) ? '1' : '0';
    labTEl.style.opacity = (sp > 0.61 && sp < 0.90) ? '1' : '0';

    renderer.render(scene, camera);
  }

  // ?? RESIZE
  window.addEventListener('resize', function() {
    W = window.innerWidth; H = window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

  animate();
  console.log('Active Theory Clone ready | THREE r' + THREE.REVISION);
}

boot();
})();
</script>
</body>
</html>
