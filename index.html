<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>M7 — Digital Depth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010812;overflow-x:hidden;font-family:'Courier New',monospace;color:#fff}
#scroll-space{height:700vh}
#canvas-wrapper{position:fixed;inset:0;z-index:0}
canvas{display:block}

/* UNDERWATER VIGNETTE — heavier at edges */
#vignette{position:fixed;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,
    transparent 30%,rgba(1,8,18,0.6) 70%,rgba(1,4,12,0.95) 100%)}

/* CHROMATIC ABERRATION via CSS filter on canvas */
#canvas-wrapper{filter:drop-shadow(0 0 0px transparent)}
#ca-overlay{position:fixed;inset:0;z-index:4;pointer-events:none;mix-blend-mode:screen;
  background:transparent}

/* SCAN LINE — subtle underwater wave feel */
#scanlines{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:.025;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,20,40,0.4) 2px,rgba(0,20,40,0.4) 4px)}

/* NAV */
nav{position:fixed;top:28px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;align-items:center;gap:6px;padding:11px 32px;
  border:1px solid rgba(26,174,222,0.2);border-radius:32px;
  background:rgba(0,8,20,0.55);backdrop-filter:blur(24px);white-space:nowrap}
.nl{font-size:10px;letter-spacing:4px;color:rgba(180,220,255,0.7);text-decoration:none;transition:color .2s}
.nl:hover{color:#1aeade}
.ns{color:rgba(26,174,222,0.25);margin:0 8px}

/* SCROLL HINT */
#sh{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;transition:opacity .8s}
#sh-txt{font-size:9px;letter-spacing:5px;color:rgba(26,174,222,0.4)}
#sh-line{width:1px;height:32px;margin:10px auto 0;
  background:linear-gradient(to bottom,rgba(26,174,222,0.5),transparent);
  animation:shpulse 2s ease-in-out infinite}
@keyframes shpulse{0%,100%{transform:scaleY(0);transform-origin:top}60%{transform:scaleY(1);transform-origin:top}}

/* DEPTH INDICATOR */
#depth{position:fixed;right:36px;top:50%;transform:translateY(-50%);
  z-index:10;opacity:0;text-align:right}
#depth-num{font-size:28px;letter-spacing:2px;color:rgba(26,174,222,0.5);line-height:1}
#depth-unit{font-size:8px;letter-spacing:3px;color:rgba(26,174,222,0.3);margin-top:4px}
#depth-bar{width:1px;height:120px;margin:12px 0 0 auto;
  background:rgba(26,174,222,0.15);position:relative;overflow:hidden}
#depth-fill{position:absolute;bottom:0;width:100%;background:rgba(26,174,222,0.4);
  height:0%;transition:height .1s}

/* HERO TEXT */
#hero{position:fixed;left:8%;top:50%;transform:translateY(-50%);z-index:10;
  opacity:0;pointer-events:none;max-width:400px}
#hero h1{font-size:clamp(30px,5vw,68px);letter-spacing:6px;line-height:1.05;
  background:linear-gradient(135deg,rgba(255,255,255,0.95) 50%,rgba(26,174,222,0.8));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#hero .tagline{font-size:9px;letter-spacing:5px;color:rgba(26,174,222,0.6);margin-top:16px}
#hero .cta{display:inline-block;margin-top:26px;padding:10px 26px;
  border:1px solid rgba(26,174,222,0.4);border-radius:20px;font-size:9px;
  letter-spacing:3px;color:#1aeade;text-decoration:none;pointer-events:all;
  background:rgba(26,174,222,0.05);backdrop-filter:blur(8px);transition:all .25s;
  -webkit-text-fill-color:#1aeade}
#hero .cta:hover{background:rgba(26,174,222,0.12);border-color:#1aeade}

/* SIDEBAR */
#sidebar{position:fixed;left:6%;top:50%;transform:translateY(-50%);z-index:10;
  opacity:0;pointer-events:none;
  background:rgba(0,8,24,0.8);backdrop-filter:blur(28px);
  border:1px solid rgba(26,174,222,0.12);border-radius:14px;padding:26px 24px;min-width:230px}
#sidebar h3{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.8);margin-bottom:14px}
.sb-div{height:1px;background:rgba(26,174,222,0.12);margin:14px 0}
.sb-lk{display:block;font-size:10px;letter-spacing:1.5px;color:#1aeade;
  margin:9px 0;text-decoration:none;transition:all .2s;pointer-events:all}
.sb-lk:hover{color:#d4af37;transform:translateX(5px)}

/* LAB */
#lab-txt{position:fixed;bottom:15%;left:50%;transform:translateX(-50%);
  z-index:10;opacity:0;text-align:center;pointer-events:none}
#lab-txt h2{font-size:clamp(20px,3vw,44px);letter-spacing:8px;
  background:linear-gradient(135deg,#8a45ff,#1aeade);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#lab-txt p{font-size:9px;letter-spacing:4px;color:rgba(138,69,255,0.6);margin-top:14px}

/* SECTION */
#sec{position:fixed;top:28px;right:36px;z-index:10;opacity:0;
  font-size:8px;letter-spacing:3px;color:rgba(26,174,222,0.3);pointer-events:none}

/* WATER RIPPLE OVERLAY */
#ripple{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0.04;
  background:conic-gradient(from 0deg at 50% 0%,transparent 85%,rgba(0,80,120,0.3) 90%,transparent 95%);
  animation:rippleRot 8s linear infinite}
@keyframes rippleRot{from{transform:scaleY(2) rotate(0deg)}to{transform:scaleY(2) rotate(360deg)}}
</style>
</head>
<body>

<div id="vignette"></div>
<div id="scanlines"></div>
<div id="ripple"></div>
<div id="canvas-wrapper"><canvas id="c"></canvas></div>
<div id="scroll-space"></div>

<nav>
  <a href="#" class="nl">WORK</a>
  <span class="ns">—</span>
  <a href="#" class="nl">LAB</a>
  <span class="ns">—</span>
  <a href="#" class="nl">CONTACT</a>
</nav>

<div id="sh"><div id="sh-txt">DESCEND</div><div id="sh-line"></div></div>

<div id="depth">
  <div id="depth-num">000</div>
  <div id="depth-unit">METERS</div>
  <div id="depth-bar"><div id="depth-fill"></div></div>
</div>

<div id="hero">
  <h1>M7<br>DIGITAL</h1>
  <div class="tagline">PREMIUM DIGITAL EXPERIENCES</div>
  <a href="#" class="cta">EXPLORE ↓</a>
</div>

<div id="sidebar">
  <h3>WHAT ARE YOU<br>LOOKING FOR?</h3>
  <div class="sb-div"></div>
  <a href="#" class="sb-lk">→ DIGITAL TRANSFORMATION</a>
  <a href="#" class="sb-lk">→ SOCIAL MEDIA</a>
  <a href="#" class="sb-lk">→ XR / AI</a>
  <a href="#" class="sb-lk">→ TRADING SYSTEMS</a>
  <a href="#" class="sb-lk">→ E-COMMERCE</a>
</div>

<div id="lab-txt">
  <h2>// THE LAB</h2>
  <p>WHERE THE DEEP WORK HAPPENS</p>
</div>

<div id="sec">DEPTH_01</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<script>
(function(){
'use strict';
if(typeof THREE==='undefined'||typeof gsap==='undefined'){
  console.error('Deps not loaded'); return;
}
gsap.registerPlugin(ScrollTrigger);

const mob=window.innerWidth<768;
let W=window.innerWidth, H=window.innerHeight;

// ── RENDERER ────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:!mob,alpha:false});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,mob?1.5:2));
renderer.setClearColor(0x010812);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

// ── SCENE ───────────────────────────────────────────────────────
const scene=new THREE.Scene();
// UNDERWATER FOG — blue-black, dense
scene.fog=new THREE.FogExp2(0x010d1f,0.018);
scene.background=new THREE.Color(0x010812);

// ── CAMERA ──────────────────────────────────────────────────────
const camera=new THREE.PerspectiveCamera(58,W/H,0.1,200);
camera.position.set(0,2,11);
const camT=new THREE.Vector3(0,0,0);

// ── LIGHTS ──────────────────────────────────────────────────────
// Ambient — deep ocean
scene.add(new THREE.AmbientLight(0x010d25,4));

// Caustic light from above — pale gold-white, like sun through water
const causticL=new THREE.DirectionalLight(0xb8d4ff,1.2);
causticL.position.set(0,20,5);
scene.add(causticL);

// Bioluminescent fill — teal
const bioL=new THREE.PointLight(0x1aeade,2,35);
bioL.position.set(-3,0,4);
scene.add(bioL);

// Deep purple fill
const deepL=new THREE.PointLight(0x3a1a6e,1.5,25);
deepL.position.set(3,-10,3);
scene.add(deepL);

// Lab light — purple/violet
const labL=new THREE.PointLight(0x6a1aee,5,30);
labL.position.set(0,-40,3);
scene.add(labL);

// Moving mouse light
const movL=new THREE.PointLight(0x4488cc,2,12);
scene.add(movL);

// ═══════════════════════════════════════════════════════════════
// LIGHT RAYS from above — caustic shafts through water
// ═══════════════════════════════════════════════════════════════
const rayGroup=new THREE.Group();
scene.add(rayGroup);

const rayPositions=[[0,0],[1.8,-0.5],[-1.5,0.8],[3,-1],[−2.5,1.2]];
// use simple array
const rayXZ=[[-0.3,0.2],[1.8,-0.5],[-1.5,0.8],[3.0,-1.0],[-2.5,1.2]];
rayXZ.forEach(([x,z])=>{
  const rGeo=new THREE.CylinderGeometry(0.08,0.4,30,8,1,true);
  const rMat=new THREE.MeshBasicMaterial({
    color:0x4499cc,transparent:true,opacity:0.04,
    side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending
  });
  const ray=new THREE.Mesh(rGeo,rMat);
  ray.position.set(x,12,z);
  ray.userData.baseOpacity=0.03+Math.random()*0.03;
  rayGroup.add(ray);
});

// ═══════════════════════════════════════════════════════════════
// HERO LOGO — metallic hourglass with underwater glow
// ═══════════════════════════════════════════════════════════════
const logoGroup=new THREE.Group();
scene.add(logoGroup);

// Outer ring — wet chrome
const outerRingGeo=new THREE.TorusGeometry(2.0,0.045,20,100);
const chromeMat=new THREE.MeshStandardMaterial({
  color:0x8ab8d8,metalness:1.0,roughness:0.0,
  emissive:0x1a4466,emissiveIntensity:0.3,
  envMapIntensity:2
});
logoGroup.add(new THREE.Mesh(outerRingGeo,chromeMat));

// Inner glow ring
const innerRingGeo=new THREE.TorusGeometry(1.72,0.012,8,80);
logoGroup.add(new THREE.Mesh(innerRingGeo,new THREE.MeshBasicMaterial({
  color:0x1aeade,transparent:true,opacity:0.35,blending:THREE.AdditiveBlending
})));

// Hourglass outline — top oval
function makeOval(rx,ry,y,color,opacity=1){
  const c=new THREE.EllipseCurve(0,0,rx,ry,0,Math.PI*2,false,0);
  const g=new THREE.BufferGeometry().setFromPoints(c.getPoints(72).map(p=>new THREE.Vector3(p.x,p.y,0)));
  const m=new THREE.LineBasicMaterial({color,transparent:opacity<1,opacity});
  const l=new THREE.Line(g,m);
  l.position.y=y;
  return l;
}
logoGroup.add(makeOval(1.1,0.68, 1.6, 0x6ab8cc));
logoGroup.add(makeOval(1.1,0.68,-1.6, 0x6ab8cc));

// Neck
const nkMat=new THREE.LineBasicMaterial({color:0x5a99bb});
[[-.7,1.0,-.5,-1.0],[.7,1.0,.5,-1.0]].forEach(([x1,y1,x2,y2])=>{
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,y1,0),new THREE.Vector3(x2,y2,0)]);
  logoGroup.add(new THREE.Line(g,nkMat));
});

// Inner rings (bioluminescent)
[-0.5,0,0.5].forEach(y=>{
  const w=0.42+(1-Math.abs(y)*0.5)*0.18;
  const c=new THREE.EllipseCurve(0,0,w,0.1,0,Math.PI*2,false,0);
  const g=new THREE.BufferGeometry().setFromPoints(c.getPoints(32).map(p=>new THREE.Vector3(p.x,p.y,0)));
  const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:0x1aeade,transparent:true,opacity:0.6}));
  l.position.y=y;
  logoGroup.add(l);
});

// Bioluminescent dot
const bioDot=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),
  new THREE.MeshBasicMaterial({color:0xd4af37,blending:THREE.AdditiveBlending}));
bioDot.position.set(1.05,-1.95,0);
logoGroup.add(bioDot);

// Logo orbital particles — slow drift like plankton
const lOrbCount=100;
const lOrbPos=new Float32Array(lOrbCount*3);
const lOrbCol=new Float32Array(lOrbCount*3);
const lOrbSiz=new Float32Array(lOrbCount);
const lOrbVel=new Float32Array(lOrbCount*3);
for(let i=0;i<lOrbCount;i++){
  const a=Math.random()*Math.PI*2;
  const r=1.6+Math.random()*1.8;
  const h=(Math.random()-0.5)*3.5;
  lOrbPos[i*3]=Math.cos(a)*r; lOrbPos[i*3+1]=h; lOrbPos[i*3+2]=Math.sin(a)*r;
  // Colors: cyan, teal, white, soft gold
  const c=Math.random();
  if(c<0.4){lOrbCol[i*3]=0.1;lOrbCol[i*3+1]=0.92;lOrbCol[i*3+2]=0.87;}
  else if(c<0.7){lOrbCol[i*3]=0.8;lOrbCol[i*3+1]=0.9;lOrbCol[i*3+2]=1.0;}
  else{lOrbCol[i*3]=0.9;lOrbCol[i*3+1]=0.85;lOrbCol[i*3+2]=0.5;}
  lOrbSiz[i]=0.4+Math.random()*0.8;
  lOrbVel[i*3]=(Math.random()-0.5)*0.001;
  lOrbVel[i*3+1]=(Math.random()-0.5)*0.001;
  lOrbVel[i*3+2]=(Math.random()-0.5)*0.001;
}
const lOrbGeo=new THREE.BufferGeometry();
lOrbGeo.setAttribute('position',new THREE.BufferAttribute(lOrbPos,3));
lOrbGeo.setAttribute('aColor',new THREE.BufferAttribute(lOrbCol,3));
lOrbGeo.setAttribute('aSize',new THREE.BufferAttribute(lOrbSiz,1));

// ═══════════════════════════════════════════════════════════════
// MARINE SNOW (main particle system) — feels like underwater
// ═══════════════════════════════════════════════════════════════
const SNOW_N=mob?250:500;
const snPos=new Float32Array(SNOW_N*3);
const snCol=new Float32Array(SNOW_N*3);
const snSiz=new Float32Array(SNOW_N);
const snVel=new Float32Array(SNOW_N*3);
const snPhase=new Float32Array(SNOW_N);

for(let i=0;i<SNOW_N;i++){
  snPos[i*3]=(Math.random()-0.5)*22;
  snPos[i*3+1]=(Math.random()-0.5)*100;
  snPos[i*3+2]=(Math.random()-0.5)*12;
  // Very slow fall — marine snow
  snVel[i*3]=(Math.random()-0.5)*0.002;  // gentle sideways drift
  snVel[i*3+1]=-(Math.random()*0.004+0.001); // slow fall
  snVel[i*3+2]=(Math.random()-0.5)*0.002;
  snPhase[i]=Math.random()*Math.PI*2;
  // Colors: mostly white/blue, occasional bio-green/gold
  const r=Math.random();
  if(r<0.55){snCol[i*3]=0.85;snCol[i*3+1]=0.92;snCol[i*3+2]=1.0;}       // blue-white
  else if(r<0.75){snCol[i*3]=0.1;snCol[i*3+1]=0.92;snCol[i*3+2]=0.87;}   // cyan
  else if(r<0.88){snCol[i*3]=0.5;snCol[i*3+1]=0.8;snCol[i*3+2]=0.5;}     // bio-green
  else if(r<0.95){snCol[i*3]=1.0;snCol[i*3+1]=0.87;snCol[i*3+2]=0.48;}   // gold plankton
  else{snCol[i*3]=0.6;snCol[i*3+1]=0.4;snCol[i*3+2]=1.0;}                // violet bioluminescent
  // Most are tiny (marine snow) with occasional bigger plankton
  snSiz[i]=r<0.7?(0.3+Math.random()*0.5):(1.2+Math.random()*1.5);
}

const snGeo=new THREE.BufferGeometry();
snGeo.setAttribute('position',new THREE.BufferAttribute(snPos,3));
snGeo.setAttribute('aColor',new THREE.BufferAttribute(snCol,3));
snGeo.setAttribute('aSize',new THREE.BufferAttribute(snSiz,1));

const waterParticleMat=new THREE.ShaderMaterial({
  uniforms:{uPR:{value:renderer.getPixelRatio()},uTime:{value:0}},
  vertexShader:`
    attribute vec3 aColor;
    attribute float aSize;
    uniform float uPR, uTime;
    varying vec3 vColor;
    varying float vAlpha;
    void main(){
      vColor = aColor;
      vec3 pos = position;
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = aSize * uPR * (160.0 / -mv.z);
      // fade with depth
      float d = -mv.z;
      vAlpha = 0.85 * (1.0 - smoothstep(8.0, 20.0, d));
    }`,
  fragmentShader:`
    varying vec3 vColor;
    varying float vAlpha;
    void main(){
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if(d > 0.5) discard;
      // soft blob — organic, not sharp star
      float soft = 1.0 - smoothstep(0.0, 0.5, d);
      float core = 1.0 - smoothstep(0.0, 0.25, d);
      vec3 col = vColor + vColor * core * 0.4;
      gl_FragColor = vec4(col, vAlpha * soft * 0.9);
    }`,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
});
const snowParticles=new THREE.Points(snGeo,waterParticleMat);
scene.add(snowParticles);

// Logo orbital particles (same shader)
const lOrbMat=new THREE.ShaderMaterial({
  uniforms:{uPR:{value:renderer.getPixelRatio()},uTime:{value:0}},
  vertexShader:`
    attribute vec3 aColor; attribute float aSize; uniform float uPR,uTime;
    varying vec3 vColor; varying float vAlpha;
    void main(){
      vColor=aColor;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_Position=projectionMatrix*mv;
      gl_PointSize=aSize*uPR*(200.0/-mv.z);
      vAlpha=0.9;
    }`,
  fragmentShader:`
    varying vec3 vColor; varying float vAlpha;
    void main(){
      float d=length(gl_PointCoord-vec2(0.5));
      if(d>0.5) discard;
      float s=1.0-smoothstep(0.0,0.5,d);
      float c=1.0-smoothstep(0.0,0.2,d);
      gl_FragColor=vec4(vColor+vColor*c*0.5,vAlpha*s*0.85);
    }`,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
});
logoGroup.add(new THREE.Points(lOrbGeo,lOrbMat));

// ═══════════════════════════════════════════════════════════════
// BUBBLES — rising transparent spheres
// ═══════════════════════════════════════════════════════════════
const bubbleGroup=new THREE.Group();
scene.add(bubbleGroup);
const BCOUNT=mob?20:35;
const bubbles=[];
for(let i=0;i<BCOUNT;i++){
  const r=0.04+Math.random()*0.12;
  const geo=new THREE.SphereGeometry(r,8,8);
  const mat=new THREE.MeshStandardMaterial({
    color:0x88ccee,metalness:0.1,roughness:0,
    transparent:true,opacity:0.12+Math.random()*0.1,
    side:THREE.DoubleSide
  });
  const b=new THREE.Mesh(geo,mat);
  b.position.set(
    (Math.random()-0.5)*16,
    (Math.random()-0.5)*90,
    (Math.random()-0.5)*8
  );
  b.userData={
    speed:0.01+Math.random()*0.025,
    wobble:Math.random()*Math.PI*2,
    wobbleSpeed:0.5+Math.random()*0.5,
    wobbleAmp:0.03+Math.random()*0.06,
    baseX:b.position.x
  };
  bubbleGroup.add(b);
  bubbles.push(b);
}

// ═══════════════════════════════════════════════════════════════
// CENTRAL SPINE — bioluminescent coral/antenna
// ═══════════════════════════════════════════════════════════════
const spineGroup=new THREE.Group();
scene.add(spineGroup);

// Main core — thin glass rod
const coreGeo=new THREE.CylinderGeometry(0.008,0.008,130,6);
const coreMat=new THREE.MeshBasicMaterial({color:0x1aeade,transparent:true,opacity:0.25});
spineGroup.add(new THREE.Mesh(coreGeo,coreMat));

// Organic branching nodes (not mechanical DNA — coral-like)
const nodeColors=[0x1aeade,0x46f441,0xd4af37,0x8a45ff,0x4488ff];
for(let i=0;i<40;i++){
  const y=-65+i*3.3;
  const t=i/40;
  const angle=(i/40)*Math.PI*8;
  // node sphere
  const nc=nodeColors[i%5];
  const nd=new THREE.Mesh(
    new THREE.SphereGeometry(0.03+Math.sin(t*10)*0.015,8,8),
    new THREE.MeshStandardMaterial({color:nc,emissive:nc,emissiveIntensity:0.8,
      metalness:0.5,roughness:0.2})
  );
  nd.position.set(Math.cos(angle)*0.3,y,Math.sin(angle)*0.3);
  spineGroup.add(nd);
  // connecting tendril
  if(i>0){
    const pv=spineGroup.children[spineGroup.children.length-2].position;
    const g=new THREE.BufferGeometry().setFromPoints([
      pv.clone(),nd.position.clone()
    ]);
    spineGroup.add(new THREE.Line(g,new THREE.LineBasicMaterial({
      color:nc,transparent:true,opacity:0.2})));
  }
}

// ═══════════════════════════════════════════════════════════════
// FLOATING 3D CARDS — deep sea panels
// ═══════════════════════════════════════════════════════════════
const cardData=[
  {label:'DIGITAL\nTRANSFORMATION',sub:'01',col:0x02080f,border:0x1aeade,y:-10,orb:1.0,speed:0.18},
  {label:'SOCIAL\nMEDIA',sub:'02',col:0x030d08,border:0x46f441,y:-16,orb:-0.7,speed:0.22},
  {label:'TRADING\nSYSTEMS',sub:'03',col:0x0a0802,border:0xd4af37,y:-22,orb:0.9,speed:0.16},
  {label:'XR / AI',sub:'04',col:0x080212,border:0x8a45ff,y:-28,orb:-1.1,speed:0.20},
  {label:'E-COMMERCE',sub:'05',col:0x020a0e,border:0x4488ff,y:-34,orb:0.8,speed:0.19},
];
const cards3D=cardData.map(cd=>{
  const g=new THREE.Group();
  // Body
  const body=new THREE.Mesh(new THREE.PlaneGeometry(3.0,1.9),
    new THREE.MeshStandardMaterial({color:cd.col,transparent:true,opacity:0.88,
      metalness:0.6,roughness:0.3,side:THREE.DoubleSide}));
  g.add(body);
  // Border (glow edge)
  g.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(3.0,1.9)),
    new THREE.LineBasicMaterial({color:cd.border,transparent:true,opacity:0.5})));
  // Canvas text
  const cv=document.createElement('canvas'); cv.width=480; cv.height=304;
  const cx=cv.getContext('2d');
  cx.clearRect(0,0,480,304);
  const grd=cx.createLinearGradient(0,0,480,304);
  grd.addColorStop(0,'rgba(255,255,255,0.04)'); grd.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=grd; cx.fillRect(0,0,480,304);
  const hex='#'+cd.border.toString(16).padStart(6,'0');
  cx.fillStyle='rgba(255,255,255,0.25)';
  cx.font='bold 18px Courier New'; cx.fillText(cd.sub,28,44);
  cx.fillStyle='rgba(255,255,255,0.12)'; cx.fillRect(24,52,60,1);
  cx.fillStyle='rgba(255,255,255,0.85)';
  cx.font='bold 44px Courier New';
  cd.label.split('\n').forEach((ln,i)=>cx.fillText(ln,28,110+i*50));
  cx.strokeStyle=hex+'55'; cx.lineWidth=1.5; cx.strokeRect(2,2,476,300);
  g.add(new THREE.Mesh(new THREE.PlaneGeometry(3.0,1.9),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),
      transparent:true,side:THREE.DoubleSide,depthWrite:false})));
  // Bubble particles around card
  const cp=new Float32Array(15*3);
  for(let i=0;i<15;i++){
    const a=Math.random()*Math.PI*2; const r=1.6+Math.random();
    cp[i*3]=Math.cos(a)*r; cp[i*3+1]=(Math.random()-0.5)*2; cp[i*3+2]=Math.sin(a)*r;
  }
  const cpg=new THREE.BufferGeometry(); cpg.setAttribute('position',new THREE.BufferAttribute(cp,3));
  g.add(new THREE.Points(cpg,new THREE.PointsMaterial({color:cd.border,size:0.04,
    transparent:true,opacity:0.4,blending:THREE.AdditiveBlending,depthWrite:false})));
  g.position.y=cd.y;
  g.userData={...cd,baseY:cd.y};
  g.visible=false;
  scene.add(g);
  return g;
});

// ═══════════════════════════════════════════════════════════════
// LAB SECTION — deep sea chamber
// ═══════════════════════════════════════════════════════════════
const labGroup=new THREE.Group();
labGroup.position.y=-42;
scene.add(labGroup);

// Dark reflective floor
const floorMat=new THREE.MeshStandardMaterial({
  color:0x02050f,metalness:0.9,roughness:0.1,transparent:true,opacity:0.95
});
const floorMesh=new THREE.Mesh(new THREE.PlaneGeometry(24,24),floorMat);
floorMesh.rotation.x=-Math.PI/2; floorMesh.position.y=-2.5;
labGroup.add(floorMesh);

// Main platform ring
labGroup.add(new THREE.Mesh(new THREE.TorusGeometry(3,0.07,16,80),
  new THREE.MeshStandardMaterial({color:0x6a20ee,metalness:0.95,roughness:0.05,
    emissive:0x3a0a88,emissiveIntensity:0.6})));
// Outer rings
[3.8,4.6].forEach((r,i)=>labGroup.add(new THREE.Mesh(new THREE.TorusGeometry(r,0.01,8,60),
  new THREE.MeshBasicMaterial({color:[0x1aeade,0x8a45ff][i],transparent:true,opacity:0.15}))));

// Central orb — glowing core
labGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.55,32,32),
  new THREE.MeshStandardMaterial({color:0x8a45ff,emissive:0x6a1aee,emissiveIntensity:1.2,
    metalness:0.1,roughness:0,transparent:true,opacity:0.75})));
// Orb glow ring
labGroup.add(new THREE.Mesh(new THREE.TorusGeometry(0.7,0.005,6,50),
  new THREE.MeshBasicMaterial({color:0x8a45ff,transparent:true,opacity:0.6,
    blending:THREE.AdditiveBlending})));

// Crosshair
const chMat=new THREE.LineBasicMaterial({color:0x8a45ff,transparent:true,opacity:0.5});
[[new THREE.Vector3(0,-1.2,0),new THREE.Vector3(0,1.2,0)],
 [new THREE.Vector3(-1.2,0,0),new THREE.Vector3(1.2,0,0)]].forEach(pts=>{
  labGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),chMat));
});

// Lab particle ring (bioluminescent plankton ring)
const labPN=50;
const labPP=new Float32Array(labPN*3);
for(let i=0;i<labPN;i++){
  const a=(i/labPN)*Math.PI*2; const r=2.8+Math.random()*0.6;
  labPP[i*3]=Math.cos(a)*r; labPP[i*3+1]=(Math.random()-0.5)*0.4; labPP[i*3+2]=Math.sin(a)*r;
}
const labPG=new THREE.BufferGeometry(); labPG.setAttribute('position',new THREE.BufferAttribute(labPP,3));
labGroup.add(new THREE.Points(labPG,new THREE.PointsMaterial({
  color:0x8a45ff,size:0.09,transparent:true,opacity:0.7,
  blending:THREE.AdditiveBlending,depthWrite:false})));

// Industrial wires from floor
[[-2.8,2.8],[-2.8,-2.8],[2.8,2.8],[2.8,-2.8]].forEach(([x,z])=>{
  const wm=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,5,4),
    new THREE.MeshBasicMaterial({color:0x223355,transparent:true,opacity:0.5}));
  wm.position.set(x,-1,z);
  labGroup.add(wm);
});

labGroup.visible=false;

// ═══════════════════════════════════════════════════════════════
// MOUSE PARALLAX
// ═══════════════════════════════════════════════════════════════
const mouse={x:0,y:0,tx:0,ty:0};
window.addEventListener('mousemove',e=>{mouse.tx=(e.clientX/W)*2-1;mouse.ty=-(e.clientY/H)*2+1;});

// ═══════════════════════════════════════════════════════════════
// GSAP SCROLL TIMELINE
// ═══════════════════════════════════════════════════════════════
const cam={x:0,y:2,z:11,lx:0,ly:0,lz:0};

const heroEl=document.getElementById('hero');
const sideEl=document.getElementById('sidebar');
const labEl=document.getElementById('lab-txt');
const shEl=document.getElementById('sh');
const secEl=document.getElementById('sec');
const depthEl=document.getElementById('depth');
const depthNum=document.getElementById('depth-num');
const depthFill=document.getElementById('depth-fill');

const sections=['DEPTH_01','DEPTH_02','DEPTH_03','DEPTH_04','DEPTH_05'];
const depths=[0,120,380,620,800];

const tl=gsap.timeline({
  scrollTrigger:{
    trigger:'#scroll-space',
    start:'top top', end:'bottom bottom',
    scrub:1.5,
    onUpdate:s=>{
      const p=s.progress;
      // Depth gauge
      const d=Math.round(p*820);
      depthNum.textContent=String(d).padStart(3,'0');
      depthFill.style.height=(p*100)+'%';
      // Section label
      const si=p<0.15?0:p<0.30?1:p<0.60?2:p<0.80?3:4;
      secEl.textContent=sections[si];
      // Cards
      cards3D.forEach((c,i)=>{
        const th=0.30+i*0.05;
        c.visible=p>th&&p<0.74;
      });
      labGroup.visible=p>0.58&&p<0.92;
    }
  }
});

// Camera path — descending into the ocean
tl.to(cam,{x:0,y:0.5,z:7, lx:0,ly:0,lz:0,  duration:1.5},'0')
  .to(cam,{x:1.2,y:-1,z:8,lx:0,ly:-0.5,lz:0,duration:1.5},'1.5')
  .to(cam,{x:2.0,y:-13,z:9,lx:0,ly:-14,lz:0,duration:3},'3')
  .to(cam,{x:-1.5,y:-28,z:9,lx:0,ly:-28,lz:0,duration:2},'6')
  .to(cam,{x:0,y:-38,z:7,lx:0,ly:-42,lz:0,duration:1.5},'8')
  .to(cam,{x:0,y:-41,z:4,lx:0,ly:-42,lz:0,duration:1},'9.5')
  .to(cam,{x:0,y:2,z:13,lx:0,ly:0,lz:0,duration:0.5},'10');

// Overlays
tl.to(shEl,{opacity:0,duration:0.3},'0')
  .to(depthEl,{opacity:1,duration:0.5},'0.2')
  .to(secEl,{opacity:1,duration:0.5},'0')
  .to(heroEl,{opacity:1,duration:0.8},'1.5')
  .to(heroEl,{opacity:0,duration:0.5},'2.8')
  .to(sideEl,{opacity:1,duration:0.8},'3')
  .to(sideEl,{opacity:0,duration:0.5},'5.5')
  .to(labEl,{opacity:1,duration:0.8},'7.5')
  .to(labEl,{opacity:0,duration:0.5},'9.2')
  .to(secEl,{opacity:0,duration:0.5},'10')
  .to(depthEl,{opacity:0,duration:0.5},'10');

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  mouse.x+=(mouse.tx-mouse.x)*0.05; // slow mouse — underwater resistance
  mouse.y+=(mouse.ty-mouse.y)*0.05;

  // Camera
  camera.position.set(cam.x+mouse.x*0.25, cam.y+mouse.y*0.18, cam.z);
  camT.set(cam.lx+mouse.x*0.08, cam.ly, cam.lz);
  camera.lookAt(camT);
  movL.position.set(mouse.x*4, cam.y+mouse.y*2.5+1, cam.z-2);

  // Water shader time
  waterParticleMat.uniforms.uTime.value=t;
  lOrbMat.uniforms.uTime.value=t;

  // Logo — slow underwater drift
  logoGroup.position.y=Math.sin(t*0.3)*0.18;
  logoGroup.rotation.y=t*0.05+mouse.x*0.08;
  logoGroup.rotation.x=mouse.y*0.05;
  logoGroup.position.x=mouse.x*0.12;

  // Light rays — animate opacity (caustic flicker)
  rayGroup.children.forEach((r,i)=>{
    r.material.opacity=r.userData.baseOpacity*(0.7+Math.sin(t*0.4+i*1.3)*0.3);
    r.rotation.y=Math.sin(t*0.1+i)*0.05;
  });

  // Bubbles rise
  bubbles.forEach(b=>{
    b.position.y+=b.userData.speed;
    b.position.x=b.userData.baseX+Math.sin(t*b.userData.wobbleSpeed+b.userData.wobble)*b.userData.wobbleAmp;
    if(b.position.y>48) b.position.y=-48;
  });

  // Cards orbit — slow, liquid
  cards3D.forEach((c,i)=>{
    if(!c.visible) return;
    const angle=t*c.userData.speed*c.userData.orb+i*(Math.PI*2/5);
    const radius=3.2+Math.sin(t*0.12+i)*0.4;
    c.position.x=Math.cos(angle)*radius;
    c.position.z=Math.sin(angle)*radius;
    c.position.y=c.userData.baseY+Math.sin(t*0.25+i)*0.1;
    c.rotation.y=-angle+Math.PI*0.5;
    c.rotation.x=mouse.y*0.03+Math.sin(t*0.2+i)*0.02;
  });

  // Spine — very slow coral sway
  spineGroup.rotation.y=t*0.02;
  spineGroup.rotation.z=Math.sin(t*0.15)*0.008;

  // Lab rotate
  if(labGroup.visible){
    labGroup.rotation.y=t*0.08;
    floorMesh.rotation.y=-t*0.06;
  }

  // Marine snow drift
  for(let i=0;i<SNOW_N;i++){
    snPos[i*3]+=snVel[i*3]+Math.sin(t*0.3+snPhase[i])*0.0008;
    snPos[i*3+1]+=snVel[i*3+1];
    snPos[i*3+2]+=snVel[i*3+2];
    if(snPos[i*3+1]<-52){snPos[i*3+1]=48; snPos[i*3]=(Math.random()-0.5)*22;}
  }
  snGeo.attributes.position.needsUpdate=true;

  // Bio-dot pulse
  bioDot.material.opacity=0.6+Math.sin(t*2)*0.4;
  const pulse=0.8+Math.sin(t*1.5)*0.2;
  bioDot.scale.setScalar(pulse);

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

animate();
console.log('M7 Underwater Engine | THREE r'+THREE.REVISION);
})();
</script>
</body>
</html>
